name: TLA+ Model Check
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'protocols/specs/tla/**'
      - 'core/pkg/**'

jobs:
  tla-check:
    name: Run TLC Model Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download TLA+ Tools
        run: |
          mkdir -p /tmp/tlaplus
          curl -fsSL https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar \
            -o /tmp/tlaplus/tla2tools.jar

      - name: Parse TLA+ Spec (SANY)
        run: |
          java -cp /tmp/tlaplus/tla2tools.jar tla2sany.SANY \
            protocols/specs/tla/HelmKernel.tla

      - name: Run TLC Model Check
        working-directory: protocols/specs/tla
        run: |
          echo "--- TLC Model Check: HelmKernel ---"
          echo "Invariants: FailClosed, MonotonicLamport, ReceiptCompleteness, PrincipalBinding, HashChainIntegrity, TypeInvariant"
          java -cp /tmp/tlaplus/tla2tools.jar tlc2.TLC \
            -config HelmKernel.cfg \
            -workers auto \
            -deadlock \
            HelmKernel.tla
          echo "✅ TLC model check passed — all invariants hold."
