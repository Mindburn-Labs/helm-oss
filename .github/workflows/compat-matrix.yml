name: Compatibility Matrix

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  compat-matrix:
    name: Build Compatibility Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build HELM CLI
        run: cd core && go build -o ../dist/helm ./cmd/helm

      - name: Run Go SDK conformance
        run: |
          cd sdk/go && GOWORK=off go test ./... -run TestConformance -v 2>&1 | tee /tmp/go-compat.log || true

      - name: Run Python SDK conformance
        run: |
          cd sdk/python && pip install -e .[dev] -q && pytest -v -k conformance 2>&1 | tee /tmp/python-compat.log || true

      - name: Run TypeScript SDK conformance
        run: |
          cd sdk/ts && npm ci --ignore-scripts && npm test -- --run 2>&1 | tee /tmp/ts-compat.log || true

      - name: Run Rust SDK conformance
        run: |
          cd sdk/rust && cargo test 2>&1 | tee /tmp/rust-compat.log || true

      - name: Run Java SDK conformance
        run: |
          cd sdk/java && mvn -q test 2>&1 | tee /tmp/java-compat.log || true

      - name: Generate compatibility matrix artifact
        run: |
          python3 -c "
          import json, re, datetime

          matrix = {
            'generated_at': datetime.datetime.utcnow().isoformat() + 'Z',
            'spec_version': open('protocols/specs/SPEC_VERSION').read().strip(),
            'sdks': {}
          }

          for lang in ['go', 'python', 'ts', 'rust', 'java']:
            log_file = f'/tmp/{lang}-compat.log'
            try:
              log = open(log_file).read()
              passed = len(re.findall(r'PASS|ok |✓', log))
              failed = len(re.findall(r'FAIL|ERROR|✗', log))
              matrix['sdks'][lang] = {
                'status': 'pass' if failed == 0 and passed > 0 else 'partial' if passed > 0 else 'fail',
                'tests_passed': passed,
                'tests_failed': failed
              }
            except FileNotFoundError:
              matrix['sdks'][lang] = {'status': 'skipped', 'tests_passed': 0, 'tests_failed': 0}

          with open('dist/compatibility-matrix.json', 'w') as f:
            json.dump(matrix, f, indent=2)
          print(json.dumps(matrix, indent=2))
          "

      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-matrix
          path: dist/compatibility-matrix.json
          retention-days: 90
