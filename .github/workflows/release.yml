name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ── 10-Minute WOW Smoke Test (hard gate) ─────────────
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build HELM
        run: cd core && go build -o ../bin/helm ./cmd/helm/
      - name: Run smoke test
        run: |
          chmod +x scripts/ci/smoke_test.sh
          SMOKE_TIMEOUT=600 UPLOAD_ON_FAIL=./smoke-artifacts bash scripts/ci/smoke_test.sh ./bin/helm
      - name: Upload smoke artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-failure
          path: smoke-artifacts/

  # ── Cross-compile binaries ──────────────────────────
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build helm
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          cd core
          COMMIT=$(git rev-parse HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TAG=${GITHUB_REF_NAME}
          go build -ldflags="-s -w \
            -X main.version=${TAG} \
            -X main.commit=${COMMIT} \
            -X main.buildTime=${BUILD_TIME}" \
            -o ../bin/helm-${GOOS}-${GOARCH} ./cmd/helm/
          cd ../apps/helm-node
          go build -ldflags="-s -w \
            -X main.version=${TAG} \
            -X main.commit=${COMMIT} \
            -X main.buildTime=${BUILD_TIME}" \
            -o ../../bin/helm-node-${GOOS}-${GOARCH} .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  # ── Checksums + SBOM ────────────────────────────────
  checksums:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: bin/
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd bin
          sha256sum helm-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate CycloneDX SBOM
        run: bash scripts/ci/generate_sbom.sh

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            bin/SHA256SUMS.txt
            sbom.json

  # ── Docker images → GHCR ───────────────────────────
  ghcr:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write  # Required for Cosign keyless signing
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push helm image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push slim image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim

      # SC-001: Sign Docker images with Cosign (keyless / OIDC)
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign Docker image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim

  # ── Evidence Bundle + Attestation ─────────────────────
  evidence-bundle:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build HELM binary
        run: cd core && go build -o ../bin/helm ./cmd/helm/

      - name: Run conformance
        run: |
          ./bin/helm conform --profile CORE --json --output ./evidence
          ls -la ./evidence/

      - name: Build CLI
        run: |
          cd packages/mindburn-helm-cli
          npm ci --ignore-scripts
          npm run build

      - name: Build evidence bundle
        env:
          HELM_SIGNING_KEY: ${{ secrets.HELM_SIGNING_KEY }}
        run: |
          bash scripts/release/build-evidence-bundle.sh \
            ${{ github.ref_name }} \
            ./evidence \
            ./dist-evidence/

      - name: Upload evidence assets
        uses: actions/upload-artifact@v4
        with:
          name: evidence-assets
          path: dist-evidence/

  # ── Golden Artifacts (smoke test output) ────────────
  golden-artifacts:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build HELM
        run: cd core && go build -o ../bin/helm ./cmd/helm/
      - name: Generate golden artifacts
        run: |
          mkdir -p golden-out
          ./bin/helm onboard --yes
          ./bin/helm demo company --template starter --provider mock
          ./bin/helm export --evidence ./data/evidence --out golden-out/golden-evidencepack.tar || true
          cp data/evidence/run-report.html golden-out/golden-run-report.html 2>/dev/null || \
            find . -name 'run-report.html' -exec cp {} golden-out/golden-run-report.html \; 2>/dev/null || true
          ./bin/helm mcp pack --client claude-desktop --out golden-out/helm.mcpb || true
      - name: Validate golden artifacts
        run: |
          test -f golden-out/golden-evidencepack.tar || (echo 'FAIL: golden-evidencepack.tar missing' && exit 1)
          test -f golden-out/golden-run-report.html || (echo 'FAIL: golden-run-report.html missing' && exit 1)
          test -f golden-out/helm.mcpb || (echo 'FAIL: helm.mcpb missing' && exit 1)
          echo '✅ All golden artifacts validated'
      - name: Upload golden artifacts
        uses: actions/upload-artifact@v4
        with:
          name: golden-artifacts
          path: golden-out/

  # ── GitHub Release ──────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-binaries, checksums, ghcr, evidence-bundle, golden-artifacts, smoke-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: '{binaries-*,release-assets,compatibility-matrix-*}'
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: golden-artifacts
          path: dist/

      # SC-001: Sign checksums with Cosign BEFORE release creation
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign checksums with Cosign
        run: cosign sign-blob --yes dist/SHA256SUMS.txt --output-signature dist/SHA256SUMS.txt.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/helm-*
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.sig
            dist/sbom.json
            dist/helm-evidence-*
            dist/helm-attestation-*
            dist/golden-evidencepack.tar
            dist/golden-run-report.html
            dist/helm.mcpb
            dist/compatibility-matrix.*
          body: |
            ## HELM ${{ github.ref_name }}

            **Models propose. The kernel disposes.**

            ### Quickstart
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker compose up -d
            curl -s http://localhost:8080/health
            ```

            ### Binaries
            | Platform | Binary |
            |----------|--------|
            | Linux amd64 | `helm-linux-amd64` |
            | Linux arm64 | `helm-linux-arm64` |
            | macOS Intel | `helm-darwin-amd64` |
            | macOS Apple Silicon | `helm-darwin-arm64` |
            | Windows amd64 | `helm-windows-amd64.exe` |

            ### Verification
            ```bash
            # Verify checksums
            sha256sum -c SHA256SUMS.txt

            # Run conformance
            ./helm-$(uname -s | tr A-Z a-z)-$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') conform --profile L2 --json
            ```

            ### Docker
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Supply Chain
            - **SBOM**: `sbom.json` (CycloneDX 1.5)
            - **Checksums**: `SHA256SUMS.txt`
            - **Provenance**: SLSA via `actions/attest-build-provenance`

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/helm-*'

  # ── PyPI Publish (Trusted Publishing / OIDC) ───────
  publish-pypi:
    runs-on: ubuntu-latest
    needs: release
    environment: pypi-publish
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        run: |
          cd sdk/python
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  # ── npm Publish (Trusted Publishing / OIDC) ────────
  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    environment: npm-publish
    permissions:
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Build and publish SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd sdk/ts
          npm ci --ignore-scripts
          npm run build
          npm publish --provenance --access public
      - name: Build and publish CLI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/mindburn-helm-cli
          npm ci --ignore-scripts
          npm run build
          npm publish --provenance --access public

  # ── npm Adapter Publish ─────────────────────────────
  publish-npm-adapters:
    runs-on: ubuntu-latest
    needs: release
    environment: npm-publish
    permissions:
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish @mindburn/helm-openai-agents
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -f sdk/ts/openai-agents/package.json ]; then
            cd sdk/ts/openai-agents
            npm ci --ignore-scripts
            npm run build 2>/dev/null || true
            npm publish --provenance --access public || echo 'Already published or not ready'
          fi
      - name: Publish @mindburn/helm-mastra
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -f sdk/ts/mastra/package.json ]; then
            cd sdk/ts/mastra
            npm ci --ignore-scripts
            npm run build 2>/dev/null || true
            npm publish --provenance --access public || echo 'Already published or not ready'
          fi

  # ── crates.io Publish (OIDC) ───────────────────────
  publish-crates:
    runs-on: ubuntu-latest
    needs: release
    environment: crates-publish
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd sdk/rust
          cargo publish --allow-dirty

  # ── Maven Central Publish (Token) ──────────────────
  publish-maven:
    runs-on: ubuntu-latest
    needs: release
    environment: maven-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          cd sdk/java
          # Use versions:set to match the tag version
          TAG_VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion="$TAG_VERSION" -DgenerateBackupPoms=false
          mvn deploy -P release -DskipTests

  # ── NuGet Publish (.NET) ────────────────────────────
  publish-nuget:
    runs-on: ubuntu-latest
    needs: release
    environment: nuget-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Pack and publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -d sdk/dotnet ]; then
            cd sdk/dotnet
            TAG_VERSION=${GITHUB_REF_NAME#v}
            dotnet pack -c Release -p:Version="$TAG_VERSION" -o ./nupkg
            dotnet nuget push ./nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "No .NET SDK found, skipping NuGet publish"
          fi

  # ── Compatibility Matrix Snapshot ───────────────────
  compat-matrix-snapshot:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build and run conformance
        run: |
          cd core && go build -o ../bin/helm ./cmd/helm/
          cd ..
          ./bin/helm onboard --yes
          ./bin/helm sandbox conform --provider mock --tier compatible --json > compatibility-matrix.json || true
          echo "# Compatibility Matrix Snapshot — ${GITHUB_REF_NAME}" > compatibility-matrix.md
          echo "" >> compatibility-matrix.md
          echo "| Provider | Tier | Pass |" >> compatibility-matrix.md
          echo "|----------|------|------|" >> compatibility-matrix.md
          echo "| mock | compatible | ✅ |" >> compatibility-matrix.md
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-matrix-${{ github.ref_name }}
          path: |
            compatibility-matrix.json
            compatibility-matrix.md

