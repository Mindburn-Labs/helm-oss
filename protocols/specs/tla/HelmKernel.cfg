---- CONFIG HelmKernel ----
\* TLC Configuration for HELM Kernel Model Checking
\*
\* This configuration enables full TLC model checking of the HELM Kernel
\* safety invariants. Used by CI via .github/workflows/tla-check.yml.

CONSTANTS
    Principals = {p1, p2}
    Tools = {t1, t2}
    Policies = {"read", "execute"}

INIT Init

NEXT Next

\* Safety Invariants — CI MUST FAIL if any of these are violated.

INVARIANT FailClosed
INVARIANT MonotonicLamport
INVARIANT ReceiptCompleteness
INVARIANT PrincipalBinding
INVARIANT HashChainIntegrity
INVARIANT TypeInvariant

\* Properties

PROPERTY Safety

\* State constraint to keep model finite during checking.
CONSTRAINT
    lamportClock < 6
