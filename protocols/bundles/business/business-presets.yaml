  business_function: legal
  tags: [legal, compliance, regulatory]

spec:
  governs:
    - Contract management
    - Regulatory filings
    - Legal hold operations
    - Privilege-protected communications

  policies:
    - kind: DenyRule
      name: deny-privilege-waiver
      match:
        effect_type: data_share
        conditions:
          - field: params.data_class
