apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: engineering
  version: 1.0.0
  description: Software engineering team preset
  business_function: engineering
  tags: [engineering, development, ci-cd]

spec:
  governs:
    - Code repository operations
    - CI/CD pipeline executions
    - Infrastructure provisioning
    - Dependency management
    - Secret access

  policies:
    - kind: DenyRule
      name: deny-prod-deploy-no-review
      match:
        effect_type: deploy
        conditions:
          - field: params.target
            operator: equals
            value: production
          - field: context.review_approved
            operator: empty
      verdict: DENY
      reason_code: MISSING_REQUIREMENT
      reason: "Production deployments require peer review approval"

    - kind: ApprovalGate
      name: approve-infra-changes
      match:
        effect_type: infrastructure_change
        conditions:
          - field: params.scope
            operator: in
            values: [PRODUCTION, STAGING]
      verdict: ESCALATE
      reason_code: TEMPORAL_INTERVENTION
      reason: "Infrastructure changes to production/staging require approval"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: customer-support
  version: 1.0.0
  description: Customer support team preset
  business_function: customer_support
  tags: [support, customer-data, pii]

spec:
  governs:
    - Customer PII access
    - Ticket management
    - Billing data access
    - Communication channels

  policies:
    - kind: DenyRule
      name: deny-bulk-pii-export
      match:
        effect_type: data_export
        conditions:
          - field: params.data_class
            operator: in
            values: [PII, CUSTOMER_DATA]
          - field: params.record_count
            operator: greater_than
            value: 100
      verdict: DENY
      reason_code: POLICY_VIOLATION
      reason: "Bulk PII export requires escalation to data protection team"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: finance-ops
  version: 1.0.0
  description: Finance operations team preset
  business_function: finance
  tags: [finance, accounting, treasury]

spec:
  governs:
    - Financial transactions
    - Invoice processing
    - Payroll operations
    - Budget management

  policies:
    - kind: ApprovalGate
      name: approve-high-value-payment
      match:
        effect_type: financial_transfer
        conditions:
          - field: params.amount_cents
            operator: greater_than
            value: 500000
      verdict: ESCALATE
      reason_code: TEMPORAL_INTERVENTION
      reason: "Payments over $5,000 require treasury approval"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: hr-people
  version: 1.0.0
  description: HR and People team preset
  business_function: hr
  tags: [hr, people, employee-data]

spec:
  governs:
    - Employee personal data
    - Compensation information
    - Performance records
    - Recruitment data

  policies:
    - kind: DenyRule
      name: deny-employee-data-share
      match:
        effect_type: data_share
        conditions:
          - field: params.data_class
            operator: in
            values: [EMPLOYEE_DATA, COMPENSATION, PERFORMANCE]
          - field: context.need_to_know
            operator: empty
      verdict: DENY
      reason_code: POLICY_VIOLATION
      reason: "Employee data requires need-to-know authorization"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
