  version: 1.0.0
  description: Executive leadership preset
  business_function: executive
  tags: [executive, c-suite, board]

spec:
  governs:
    - Board communications
    - M&A data
    - Strategic decisions
    - Investor relations

  policies:
    - kind: DenyRule
