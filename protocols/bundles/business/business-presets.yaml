apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: marketing
  version: 1.0.0
  description: Marketing team preset
  business_function: marketing
  tags: [marketing, analytics, campaigns]

spec:
  governs:
    - Campaign analytics
    - Customer segmentation
    - Ad platform integrations
    - Content publishing

  policies:
