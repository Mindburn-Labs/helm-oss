apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: sales
  version: 1.0.0
  description: Sales team preset
  business_function: sales
  tags: [sales, crm, deals]

spec:
  governs:
    - CRM data access
    - Pricing and discounting
    - Customer communications
    - Revenue operations

  policies:
    - kind: ApprovalGate
      name: approve-large-discount
      match:
        effect_type: pricing_override
        conditions:
          - field: params.discount_percent
            operator: greater_than
            value: 25
      verdict: ESCALATE
      reason_code: TEMPORAL_INTERVENTION
      reason: "Discounts above 25% require sales leadership approval"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: data-science
  version: 1.0.0
  description: Data science and ML team preset
  business_function: data_science
  tags: [ml, ai, data-science, model-training]

spec:
  governs:
    - Model training pipelines
    - Dataset access
    - Experiment tracking
    - Model deployment

  policies:
    - kind: DenyRule
      name: deny-pii-in-training
      match:
        effect_type: model_train
        conditions:
          - field: params.dataset_tags
            operator: contains
            value: PII
          - field: context.anonymization_applied
            operator: empty
      verdict: DENY
      reason_code: POLICY_VIOLATION
      reason: "PII data must be anonymized before model training"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: security-ops
  version: 1.0.0
  description: Security operations team preset
  business_function: security
  tags: [security, soc, incident-response]

spec:
  governs:
    - Incident response
    - Vulnerability management
    - Access reviews
    - Threat intelligence

  policies:
    - kind: DenyRule
      name: deny-vuln-disclosure-premature
      match:
        effect_type: data_share
        conditions:
          - field: params.data_class
            operator: equals
            value: VULNERABILITY
          - field: context.disclosure_authorized
            operator: empty
      verdict: DENY
      reason_code: POLICY_VIOLATION
      reason: "Vulnerability details cannot be shared without authorized disclosure"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
  name: product-management
  version: 1.0.0
  description: Product management team preset
  business_function: product
  tags: [product, roadmap, analytics]

spec:
  governs:
    - Roadmap data
    - User analytics
    - Feature experimentation
    - Customer feedback

  policies:
    - kind: DenyRule
      name: deny-roadmap-leak
      match:
        effect_type: data_share
        conditions:
          - field: params.data_class
            operator: in
            values: [ROADMAP, STRATEGY, UNRELEASED_FEATURE]
          - field: context.external
            operator: equals
            value: true
      verdict: DENY
      reason_code: POLICY_VIOLATION
      reason: "Unreleased product information cannot be shared externally"
---
apiVersion: helm.sh/v1
kind: BusinessPreset
metadata:
