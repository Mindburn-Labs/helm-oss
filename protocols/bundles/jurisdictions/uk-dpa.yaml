apiVersion: helm.sh/v1
kind: JurisdictionPack
metadata:
  name: uk-dpa
  version: 1.0.0
  description: United Kingdom Data Protection Act 2018 + UK GDPR
  jurisdiction: UK
  regulations:
    - UK GDPR (retained EU law)
    - Data Protection Act 2018
    - Online Safety Act 2023
  tags: [uk, dpa, privacy, ico]

spec:
  legal_regime: UK
  data_residency: UK
  applicable_regulations:
    - id: UK_GDPR
      name: UK General Data Protection Regulation
      authority: Information Commissioner's Office
    - id: UK_OSA
      name: Online Safety Act
      version: "2023"
      authority: Ofcom

  policies:
    - kind: DenyRule
      name: deny-international-transfer
      match:
        effect_type: data_export
        conditions:
          - field: params.destination_region
            operator: not_in
            values: [UK, EEA, adequacy_listed]
      verdict: DENY
      reason_code: DENY_UK_INTERNATIONAL_TRANSFER
      reason: "International data transfer requires UK IDTA or adequacy decision"

    - kind: DenyRule
      name: deny-age-verification
      match:
        effect_type: user_profiling
        conditions:
          - field: context.user_age
            operator: less_than
            value: 13
      verdict: DENY
      reason_code: DENY_UK_AGE_VERIFICATION
      reason: "Age-appropriate design code requires verification for under-13s"

  deny_codes:
    - code: DENY_UK_INTERNATIONAL_TRANSFER
      description: International transfer without adequate safeguards
    - code: DENY_UK_AGE_VERIFICATION
      description: Age verification required
    - code: DENY_UK_LAWFUL_BASIS
      description: No lawful basis for processing
