apiVersion: helm.sh/v1
kind: JurisdictionPack
metadata:
  name: uk-dpa
  version: 1.0.0
  description: United Kingdom data protection jurisdiction pack
  jurisdiction: UK
  regulations:
    - UK GDPR (retained EU law)
    - Data Protection Act 2018
    - UK AI Regulation (principles-based)
  tags: [uk, dpa, privacy]

spec:
  legal_regime: UK
  data_residency: UK
  policies:
    - kind: DenyRule
      name: deny-uk-cross-border
      description: Deny transfers without UK adequacy or safeguards
      match:
        effect_type: data_export
        conditions:
          - field: params.destination_region
            operator: not_in
            values: [UK, EEA, uk_adequacy_listed]
      verdict: DENY
      reason_code: DENY_UK_DPA_CROSS_BORDER
      reason: "Transfer requires UK adequacy decision or appropriate safeguards"
  deny_codes:
    - code: DENY_UK_DPA_CROSS_BORDER
      description: UK cross-border data transfer without safeguards
    - code: DENY_UK_DPA_NO_LAWFUL_BASIS
      description: No lawful basis under UK GDPR
---
apiVersion: helm.sh/v1
kind: JurisdictionPack
metadata:
  name: china-pipl
  version: 1.0.0
  description: China PIPL jurisdiction pack
  jurisdiction: CN
  regulations:
    - PIPL (Personal Information Protection Law)
    - DSL (Data Security Law)
    - CSL (Cybersecurity Law)
  tags: [china, pipl, dsl]

spec:
  legal_regime: CN
  data_residency: CN
  policies:
    - kind: DenyRule
      name: deny-pipl-cross-border
      description: Deny cross-border data transfer without security assessment
      match:
        effect_type: data_export
        conditions:
          - field: params.destination_region
            operator: not_equals
            value: CN
          - field: context.security_assessment
            operator: empty
      verdict: DENY
      reason_code: DENY_PIPL_CROSS_BORDER_TRANSFER
      reason: "Cross-border transfer requires CAC security assessment under PIPL Art. 38"
  deny_codes:
    - code: DENY_PIPL_CROSS_BORDER_TRANSFER
      description: Cross-border data transfer without security assessment
    - code: DENY_PIPL_CONSENT_REQUIRED
      description: Separate consent required for sensitive PI
    - code: DENY_DSL_CRITICAL_DATA
      description: Critical data processing requires security review
---
apiVersion: helm.sh/v1
kind: JurisdictionPack
metadata:
  name: japan-appi
  version: 1.0.0
  description: Japan APPI jurisdiction pack
  jurisdiction: JP
  regulations:
    - APPI (Act on Protection of Personal Information)
  tags: [japan, appi, privacy]

spec:
  legal_regime: JP
  data_residency: JP
  policies:
    - kind: DenyRule
      name: deny-appi-cross-border
      match:
        effect_type: data_export
        conditions:
          - field: params.destination_region
            operator: not_in
            values: [JP, appi_recognized]
          - field: context.consent_for_transfer
            operator: empty
      verdict: DENY
      reason_code: DENY_APPI_CROSS_BORDER_TRANSFER
      reason: "Cross-border transfer requires consent or recognized jurisdiction under APPI"
  deny_codes:
    - code: DENY_APPI_CROSS_BORDER_TRANSFER
      description: Cross-border transfer without consent or recognized jurisdiction
---
